version: '3.8'

services:
  mongodb:
    image: mongo:${MONGO_VERSION}
    container_name: mongodb
    restart: always

    env_file:
      - .env

    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}

    ports:
      - "0.0.0.0:${MONGO_PORT}:27017"

    volumes:
      - ./data:/data/db
      - ./configdb:/data/configdb

    command:
      - --bind_ip_all
      - --port
      - "27017"
      - --auth

    cpus: ${MONGO_CPUS}
    mem_limit: ${MONGO_MEMORY}

    healthcheck:
      test: >
        echo 'db.runCommand("ping").ok'
        | mongosh localhost:27017/test --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s