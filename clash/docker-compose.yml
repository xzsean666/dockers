version: '3.7'

services:
  clash:
    image: xzsean/clash:v1.18.0
    container_name: clash
    restart: unless-stopped
    ports:
      - "17890:7890"  # HTTP 代理端口
      - "17891:7891"  # SOCKS5 代理端口（如果配置中启用）
      - "17892:9090"  # 控制面板端口（API）
    volumes:
      - ./config:/root/.config/clash  # 挂载配置目录
    environment:
      - TZ=Asia/Shanghai  # 设置时区，可按需修改
