services:
  rclone-sync:
    image: ${RCLONE_SYNC_IMAGE:-your-dockerhub-user/rclone-sync:latest}
    container_name: rclone-sync
    restart: unless-stopped
    network_mode: ${RCLONE_SYNC_NETWORK_MODE:-bridge}
    env_file:
      - ${RCLONE_SYNC_ENV_FILE:-./rclone-sync.env}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs:/logs
      - ./state:/state
      - ./filters:/filters:ro

      # Mount host folders only when you use local source or target paths.
      # Example env:
      #   RCLONE_SYNC_SOURCE_ROOT=/data/source
      #   RCLONE_SYNC_TARGET_ROOT=/data/target/prefix
      # - /srv/source:/data/source:ro
      # - /srv/target:/data/target

      # Mount an existing rclone config only when using remotes from rclone.conf,
      # for example RCLONE_SYNC_TARGET_ROOT=gt:backup/b2-archive.
      # Keep writable because OAuth tokens may refresh.
      # - ~/.config/rclone:/config/rclone

      # YAML mode is optional. For normal env-only use, do not mount this.
      # - ./config.example.yaml:/config/jobs.yaml:ro
