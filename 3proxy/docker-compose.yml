version: '3.7' # 更高版本以支持 ulimits

services:
  proxy:
    image: tarampampam/3proxy:latest
    container_name: local-proxy
    ports:
      - '13128:3128'
      - '11080:1080'
    environment:
      - PROXY_LOGIN=astrid
      - PROXY_PASSWORD=111111
      - MAX_CONNECTIONS=10000
      - PRIMARY_RESOLVER=8.8.8.8
      - SECONDARY_RESOLVER=1.1.1.1
      - EXTRA_CONFIG=flush\ntimeouts 1 5 30 60 180 1800 15 60

    restart: unless-stopped
    ulimits:
      nofile:
        soft: 65535
        hard: 65535
    dns:
      - 8.8.8.8
      - 1.1.1.1
