# Backup Configuration
WALG_BACKUP_COMPRESSION_METHOD=lz4
WALG_DISK_RATE_LIMIT=10485760
WALG_NETWORK_RATE_LIMIT=10485760

# Retention Policy
WALG_RETENTION_POLICY=7
WALG_RETENTION_POLICY_MODE=delete

# WAL Archiving Configuration
# Note: These should be set in PostgreSQL configuration, not here
# archive_mode = on
# archive_command = 'wal-g wal-push %p'
# restore_command = 'wal-g wal-fetch %f %p'

WALG_ARCHIVE_TIMEOUT=300

# Performance Tuning
WALG_UPLOAD_CONCURRENCY=4
WALG_DOWNLOAD_CONCURRENCY=4
WALG_PREVENT_WAL_OVERWRITE=true

# S3 Configuration (will be overridden by environment variables)
# WALG_S3_PREFIX is required and should be set via environment
# AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION should be set via environment 