version: '3.8'

services:
  postgresql-master:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME}
    restart: always
    user: root
    env_file: .env
    environment:
      - POSTGRESQL_REPLICATION_MODE=${POSTGRESQL_REPLICATION_MODE}
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_REPLICATION_USER=${POSTGRESQL_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRESQL_REPLICATION_PASSWORD}
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD}
      # PostgreSQL WAL archiving configuration

      # PostgreSQL connection for WAL-G
      - PGUSER=postgres
      - PGPASSWORD=${POSTGRESQL_PASSWORD}
      - PGDATABASE=${POSTGRESQL_DATABASE}
      - PGHOST=localhost
      - PGPORT=5432
      # WAL-G configuration
      - WALG_S3_PREFIX=${WALG_S3_PREFIX}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION}
      # B2特定配置 (如果使用Backblaze B2)
      - AWS_ENDPOINT_URL=${AWS_ENDPOINT_URL}
      - AWS_S3_FORCE_PATH_STYLE=${AWS_S3_FORCE_PATH_STYLE:-true}
      - WALG_S3_ENDPOINT=${WALG_S3_ENDPOINT}
      - WALG_UPLOAD_CONCURRENCY=${WALG_UPLOAD_CONCURRENCY:-4}
      - WALG_DOWNLOAD_CONCURRENCY=${WALG_DOWNLOAD_CONCURRENCY:-4}
      # Restoration configuration
      - RESTORE_FROM_BACKUP=${RESTORE_FROM_BACKUP:-false}
      - BACKUP_NAME=${BACKUP_NAME:-LATEST}
    ports:
      - '${PORT}:5432'
    volumes:
      - ./data:/bitnami/postgresql
      - ./wal-g.conf:/etc/wal-g/wal-g.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USERNAME} -d ${POSTGRESQL_DATABASE}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - postgresql-network


networks:
  postgresql-network:
    driver: bridge
    name: postgresql-network

