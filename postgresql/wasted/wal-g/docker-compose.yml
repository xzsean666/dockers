version: '3'

services:
  postgresql-master:
    image: 'bitnami/postgresql:16'
    container_name: ${CONTAINER_NAME}
    restart: always
    env_file: .env
    user: root
    environment:
      # PostgreSQL 配置
      - POSTGRESQL_DATABASE=${POSTGRESQL_DATABASE}
      - POSTGRESQL_USERNAME=${POSTGRESQL_USERNAME}
      - POSTGRESQL_PASSWORD=${POSTGRESQL_PASSWORD}
      - POSTGRESQL_REPLICATION_USER=${POSTGRESQL_REPLICATION_USER}
      - POSTGRESQL_REPLICATION_PASSWORD=${POSTGRESQL_REPLICATION_PASSWORD}
      - POSTGRESQL_POSTGRES_PASSWORD=${POSTGRESQL_PASSWORD}
      
      # WAL-G 性能配置
      - WALG_UPLOAD_CONCURRENCY=${WALG_UPLOAD_CONCURRENCY}
      - WALG_DOWNLOAD_CONCURRENCY=${WALG_DOWNLOAD_CONCURRENCY}
      - WALG_DISK_RATE_LIMIT=${WALG_DISK_RATE_LIMIT}
      - WALG_NETWORK_RATE_LIMIT=${WALG_NETWORK_RATE_LIMIT}
      
      # WAL-G Backup Schedule and Retention
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE}
      - RETENTION_DAYS=${RETENTION_DAYS}
      

    ports:
      - '${PORT}:5432'
    volumes:
      - './data:/bitnami/postgresql'
      - 'local_wal_g_backups:/bitnami/postgresql/local_wal_g_backups'

volumes:
  local_wal_g_backups:


