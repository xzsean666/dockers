[global]

update every = 30
# 减少历史数据保留时间
history = 1800
# 只启用必要的收集器
enabled collectors = proc:/proc/stat proc:/proc/meminfo proc:/proc/net/dev proc:/proc/diskstats

[plugins]
enabled = yes

[web]
# 降低web界面更新频率（从5秒改为15秒）
update every = 30

# 减少内存使用
page cache size = 16
dbengine multihost disk space = 256

[health]
enabled = yes
# 降低健康检查频率（从10秒改为30秒）
run at least every seconds = 30
postpone alarms during maintenance minutes = 0
in memory max health log entries = 1000
script to execute on alarm = /usr/libexec/netdata/plugins.d/alarm-notify.sh

[plugin:proc:/proc/net/dev]
enabled = yes


[plugin:proc:/proc/diskstats]
enabled = yes


[plugin:proc]
/proc/net/dev = yes
/proc/net/netstat = yes
/proc/net/snmp = yes

[plugin:python.d]
enabled = no

[statistics]
enabled = no

[plugin:diskspace]
exclude space metrics on disks = /host/etc/group /host/etc/passwd /host/etc/os-release /var/run/docker.sock 