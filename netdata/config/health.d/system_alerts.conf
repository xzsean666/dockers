# CPU 使用率告警
alarm: cpu_usage
on: system.cpu
lookup: average -3m percentage of user,system,softirq,irq,guest
units: %
every: 1m
warn: $this > 80
crit: $this > 90
info: CPU utilization is high
repeat: warning 10m critical 5m

# 内存使用率告警
alarm: ram_usage
on: system.ram
lookup: average -1m percentage of used
units: %
every: 1m
warn: $this > 80
crit: $this > 90
info: The percentage of RAM being used by the system.
repeat: warning 10m critical 5m

# 磁盘空间告
template: disk_full_percent
on: disk.space
units: %
calc: $used * 100 / ($avail + $used)
every: 1m
warn: $this > 80
crit: $this > 90
repeat: warning 10m critical 5m


template: high_network_usage
      on: net.bits
   hosts: *
    calc: $this > 1  # 100 Mbps
   every: 30s
    warn: $this > 1
    crit: $this > 5  # 500 Mbps
info: "High network bandwidth usage detected!"
repeat: warning 1m critical 30s

