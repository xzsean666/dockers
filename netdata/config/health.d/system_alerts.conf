# CPU 使用率告警
alarm: cpu_usage
on: system.cpu
lookup: average -3m percentage of user,system,softirq,irq,guest
every: 1m
warn: $this > 85
crit: $this > 95
info: CPU utilization over 85%
to: sysadmin

# 内存使用率告警
alarm: ram_usage
on: system.ram
lookup: average -1m percentage of used
every: 1m
warn: $this > 1
crit: $this > 90
info: RAM utilization is high
to: sysadmin

# 磁盘空间告警
alarm: disk_space_usage
on: disk.space
lookup: average -1m percentage of used
every: 1m
warn: $this > 80
crit: $this > 90
info: Disk space utilization is high
to: sysadmin

# 系统负载告警
alarm: system_load
on: system.load
lookup: average -3m load15
every: 1m
warn: $this > (($status >= $WARNING)  ? (75) : (85))
crit: $this > (($status == $CRITICAL) ? (85) : (95))
info: System load average is high
to: sysadmin

# 磁盘IO告警
alarm: disk_io_utilization
on: disk.io
lookup: average -10s of utilization
every: 1m
warn: $this > 80
crit: $this > 95
info: Disk IO utilization is high
to: sysadmin

# 磁盘读写延迟告警
alarm: disk_latency
on: disk.latency
lookup: average -10s latency
every: 1m
warn: $this > 100
crit: $this > 200
info: Disk latency is too high
to: sysadmin

# 网络流入带宽告警
alarm: net_in_rate
on: net.net
lookup: average -10s of received
every: 1m
warn: $this > 10000000  # 10MB/s
crit: $this > 20000000  # 20MB/s
info: Network incoming traffic is high
to: sysadmin

# 网络流出带宽告警
alarm: net_out_rate
on: net.net
lookup: average -10s of sent
every: 1m
warn: $this > 10000000  # 10MB/s
crit: $this > 20000000  # 20MB/s
info: Network outgoing traffic is high
to: sysadmin

# 网络错误包告警
alarm: net_errors
on: net.net_errors
lookup: sum -1m of errors,drops
every: 1m
warn: $this > 5
crit: $this > 10
info: Network errors/drops detected
to: sysadmin