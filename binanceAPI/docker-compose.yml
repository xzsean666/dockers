version: '3'

services:
  nginx-proxy:
    image: nginx:alpine
    container_name: binance-api-proxy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx

    environment:
      - http_proxy=http://127.0.0.1:7897
      - https_proxy=http://127.0.0.1:7897
    user: "root"
    network_mode: host
    restart: unless-stopped
