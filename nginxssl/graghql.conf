# GraphQL 反向代理配置
server {
    listen 443 ssl http2;
    server_name your-domain.com;  # 替换为你的域名

    # SSL 配置
    ssl_certificate /etc/nginx/ssl/your-cert.pem;  # 替换为你的证书路径
    ssl_certificate_key /etc/nginx/ssl/your-key.pem;  # 替换为你的私钥路径
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS 配置
    add_header Strict-Transport-Security "max-age=63072000" always;

    # 客户端请求体大小限制
    client_max_body_size 10M;

    # GraphQL 端点配置
    location /graphql {
        proxy_pass http://your-graphql-backend:4000;  # 替换为你的 GraphQL 服务地址
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # GraphQL 特定的超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # 启用 gzip 压缩
        gzip on;
        gzip_types application/json;
        gzip_min_length 1000;
    }

    # 健康检查端点
    location /health {
        access_log off;
        return 200 'healthy\n';
    }

    # 错误页面配置
    error_page 404 /404.html;
    error_page 500 502 503 504 /50x.html;
}


location / {
    proxy_set_header Host $http_host;
    proxy_set_header Accept-Encoding "identity";
    add_header IF-CF-Modify-Accept-Encoding $http_accept_encoding;
    proxy_cache_convert_head off;
    proxy_http_version 1.1;
    proxy_pass http://127.0.0.1:5078;
}