services:
  trade-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-node24}
    network_mode: host
    volumes:
      - .:/app
      - /app/node_modules
    command: /docker-entrypoint.sh
    env_file:
      - .env
    environment:
      - CI=true
      - PYTHONUNBUFFERED=1
      - ENABLE_CICD=${ENABLE_CICD:-false}
      - START_COMMAND=${START_COMMAND:-pnpm install && pnpm build && pnpm start:prod}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    restart: unless-stopped
