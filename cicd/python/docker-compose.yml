version: '3.8'

services:
  trade-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trade-live-monitor
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - /app/.venv # 忽略本地 .venv 目录，使用空挂载覆盖
    command: /docker-entrypoint.sh
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - ENABLE_CICD=${ENABLE_CICD:-false}
      - START_COMMAND=${START_COMMAND:-uv run main.py}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
    restart: unless-stopped
