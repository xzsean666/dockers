version: '3.8'

services:
  trade-monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${CONTAINER_NAME:-python312}
    network_mode: host
    volumes:
      - .:/app
    command: /docker-entrypoint.sh
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - ENABLE_CICD=${ENABLE_CICD:-false}
      - START_COMMAND=${START_COMMAND:-python main.py}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTP_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
    restart: unless-stopped
