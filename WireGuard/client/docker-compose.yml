version: '3.8'

services:
  wireguard-client:
    image: linuxserver/wireguard:latest
    container_name: wireguard-client
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - SERVERURL=${SERVER_URL}
      - SERVERPORT=${SERVER_PORT}
      - PEERDNS=${PEER_DNS}
      - ALLOWEDIPS=${ALLOWED_IPS}
      - LOG_CONFS=${LOG_CONFS}
    volumes:
      - ${CONFIG_PATH}:/config
      - /lib/modules:/lib/modules:ro
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
    networks:
      - wireguard
    # 客户端模式，不需要暴露端口
    # 配置文件需要手动从服务端复制

networks:
  wireguard:
    driver: bridge
